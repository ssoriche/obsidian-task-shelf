name: Release

on:
    push:
        tags:
            - 'v*'

jobs:
    build-plugin:
        name: Build plugin
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build plugin
              run: bun run build

            - name: Upload plugin artifact
              uses: actions/upload-artifact@v4
              with:
                  name: plugin-build
                  path: |
                      main.js
                      manifest.json
                      styles.css

    create-release:
        name: Create release
        runs-on: ubuntu-latest
        needs: [build-plugin]
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Download plugin artifact
              uses: actions/download-artifact@v4
              with:
                  name: plugin-build
                  path: plugin-release

            - name: Extract release notes from CHANGELOG.md
              run: |
                  version="${GITHUB_REF_NAME#v}"
                  awk "/^## \[$version\]/{found=1; next} found && /^## \[/{exit} found" CHANGELOG.md > release-notes.md
                  if [ ! -s release-notes.md ]; then
                    echo "No entry found for version $version in CHANGELOG.md" && exit 1
                  fi

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  body_path: release-notes.md
                  files: |
                      plugin-release/main.js
                      plugin-release/manifest.json
                      plugin-release/styles.css
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
