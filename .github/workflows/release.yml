name: Release

on:
    push:
        tags:
            - 'v*'

env:
    BUN_VERSION: '1.2'

jobs:
    build-plugin:
        name: Build plugin
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build plugin
              run: bun run build

            - name: Upload plugin artifact
              uses: actions/upload-artifact@v7
              with:
                  name: plugin-build
                  path: |
                      main.js
                      manifest.json
                      styles.css

    create-release:
        name: Create release
        runs-on: ubuntu-latest
        needs: [build-plugin]
        concurrency:
            group: create-release-${{ github.ref }}
            cancel-in-progress: false
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Download plugin artifact
              uses: actions/download-artifact@v4
              with:
                  name: plugin-build
                  path: plugin-release

            - name: Extract release notes from CHANGELOG.md
              id: changelog
              run: |
                  version="${GITHUB_REF_NAME#v}"
                  awk "/^## \[$version\]/{found=1; next} found && /^## \[/{exit} found" CHANGELOG.md > release-notes.md
                  if [ -s release-notes.md ]; then
                    echo "has_notes=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "has_notes=false" >> "$GITHUB_OUTPUT"
                    rm -f release-notes.md
                    echo "No CHANGELOG entry for $version — release notes will be auto-generated."
                  fi

            - name: Create release (with CHANGELOG notes)
              if: steps.changelog.outputs.has_notes == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  body_path: release-notes.md
                  files: |
                      plugin-release/main.js
                      plugin-release/manifest.json
                      plugin-release/styles.css
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create release (auto-generated notes)
              if: steps.changelog.outputs.has_notes != 'true'
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: |
                      plugin-release/main.js
                      plugin-release/manifest.json
                      plugin-release/styles.css
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
