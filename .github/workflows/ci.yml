name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run ESLint
              run: bun run lint

    typecheck:
        name: Type check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bun run typecheck

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint, typecheck]
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build
              run: bun run build

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: obsidian-task-shelf-plugin
                  path: |
                      main.js
                      manifest.json
                      styles.css

    pre-release:
        name: Publish beta pre-release
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        needs: [build]
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: obsidian-task-shelf-plugin
                  path: plugin-release

            - name: Delete existing beta release
              run: gh release delete beta --yes || true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Delete existing beta tag
              run: git push origin :refs/tags/beta || true

            - name: Publish beta pre-release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: beta
                  name: Beta (latest main)
                  prerelease: true
                  generate_release_notes: false
                  body: |
                      Automated pre-release from the latest commit on `main`.
                      Install via [BRAT](https://github.com/TfTHacker/obsidian42-brat) using `ssoriche/obsidian-task-shelf`.
                  files: |
                      plugin-release/main.js
                      plugin-release/manifest.json
                      plugin-release/styles.css
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
